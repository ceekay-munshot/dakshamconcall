name: Analyze Concall

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker / symbol of the company to analyze (e.g. RELIANCE)"
        required: true
        type: string

# Least-privilege by default. Prompt 2/3 will need `contents: write` to commit
# the generated JSON back into public/data/.
permissions:
  contents: write

# Never run two analyses for the same ticker at once; let the newest win.
concurrency:
  group: analyze-${{ github.event.inputs.ticker }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Announce (STUB — no real work yet)
        run: |
          echo "=============================================="
          echo " Daksham Concall Tracker — analyze.yml (STUB)"
          echo "=============================================="
          echo "Requested ticker : ${{ github.event.inputs.ticker }}"
          echo ""
          echo "This is a placeholder. Prompt 2 will add Screener scraping +"
          echo "AI-summary fetch, Prompt 3 will add the 11-section classifier,"
          echo "and both will commit JSON back to public/data/ so the dashboard"
          echo "updates automatically on push."

