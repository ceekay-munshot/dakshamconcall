# =============================================================================
# Daksham Capital · Concall Tracker — Analyze pipeline (Step 2)
#
# Dispatched by the Worker's /api/analyze route (or manually from the Actions
# tab) with a `ticker`. It logs into Screener, fetches the latest concall AI
# summary (transcript-PDF fallback), classifies it into the fixed 11-section
# tear sheet with OpenAI, and commits the JSON back to the branch it ran on so
# Cloudflare auto-deploys and the dashboard lights up.
#
# Also runs daily in "refresh mode" (empty ticker) to re-analyze tracked
# companies whose latest quarter has gone stale.
# =============================================================================

name: Analyze Concall

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "Ticker / symbol to analyze (leave blank to refresh ALL tracked companies)"
        required: false
        type: string
      industry:
        description: "Optional industry backfill (the scraper value is primary)"
        required: false
        type: string
  schedule:
    # Daily refresh of stale tracked companies (03:30 IST ≈ 22:00 UTC).
    - cron: "0 22 * * *"

# The commit back to the repo uses the built-in Actions token.
permissions:
  contents: write

# Don't run the same ticker twice at once; let the newest finish.
concurrency:
  group: analyze-${{ github.event.inputs.ticker || 'refresh' }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the push rebase-retry loop can rebase

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps (no-save) + Chromium
        run: |
          npm install --no-save playwright pdfjs-dist
          npx playwright install --with-deps chromium

      - name: Configure git identity
        run: |
          git config user.name "daksham-bot"
          git config user.email "actions@github.com"

      - name: Analyze
        env:
          SCREENER_EMAIL: ${{ secrets.SCREENER_EMAIL }}
          SCREENER_PASSWORD: ${{ secrets.SCREENER_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }} # optional; llm.mjs defaults to gpt-4o
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          TICKER: ${{ github.event.inputs.ticker }}
          INDUSTRY: ${{ github.event.inputs.industry }} # optional search-API backfill
          EVENT_NAME: ${{ github.event_name }} # workflow_dispatch = force ALL; schedule = stale only
          TARGET_BRANCH: ${{ github.ref_name }}
        run: node screener-test/analyze-company.mjs

      # Screenshots + DOM samples for debugging the scrape (always, since the
      # live Screener DOM is what we iterate against).
      - name: Upload scrape artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-artifacts-${{ github.event.inputs.ticker || 'refresh' }}
          path: screener-test/output
          if-no-files-found: ignore
          retention-days: 7
